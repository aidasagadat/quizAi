server {
  listen 80;
  server_name _;

  # Static frontend
  root /usr/share/nginx/html;
  index index.html;

  # Proxy API calls to the backend container (named "backend" in compose, port 4000)
  location /api/ {
    proxy_pass http://backend:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;       # AI requests can take a while
    client_max_body_size 20m;      # PDF/DOCX uploads up to ~15 MB
  }

  # SPA fallback — every unknown route serves index.html so React Router works
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Gzip text assets
  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;
}
